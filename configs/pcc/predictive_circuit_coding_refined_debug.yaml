dataset_id: allen_visual_behavior_neuropixels
split_name: train
seed: 7

experiment:
  variant_name: refined_core

splits:
  train: train
  valid: valid
  discovery: discovery
  test: test

dataset_selection:
  output_name: debug_familiar_g_10_session_panel
  experience_levels: []
  image_sets: []
  session_types: []
  session_ids: []
  subject_ids: []
  exclude_session_ids: []
  exclude_subject_ids: []
  session_ids_file: selections/debug_familiar_g_session_ids.txt
  subject_ids_file:
  exclude_session_ids_file:
  exclude_subject_ids_file:
  project_codes: []
  session_numbers: []
  brain_regions_any: []
  min_n_units:
  max_n_units:
  min_trial_count:
  max_trial_count:
  min_duration_s:
  max_duration_s:
  split_seed: 7
  split_primary_axis: session
  train_fraction: 0.5
  valid_fraction: 0.2
  discovery_fraction: 0.15
  test_fraction: 0.15

data_runtime:
  bin_width_ms: 20.0
  context_bins: 500
  patch_bins: 50
  min_unit_spikes: 0
  max_units:
  padding_strategy: mask
  include_trials: true
  include_stimulus_presentations: true
  include_optotagging: true

count_normalization:
  mode: none
  stats_path:

model:
  d_model: 128
  num_heads: 4
  temporal_layers: 1
  spatial_layers: 1
  dropout: 0.1
  mlp_ratio: 4.0
  l2_normalize_tokens: true
  norm_eps: 1.0e-5
  population_token_mode: none

objective:
  predictive_target_type: delta
  continuation_baseline_type: previous_patch
  predictive_loss: mse
  reconstruction_loss: mse
  reconstruction_weight: 0.05
  reconstruction_target_mode: window_zscore
  exclude_final_prediction_patch: true

optimization:
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  batch_size: 2
  scheduler_type: cosine
  scheduler_warmup_steps: 0

training:
  num_epochs: 1
  train_steps_per_epoch: 8
  validation_steps: 2
  checkpoint_every_epochs: 1
  evaluate_every_epochs: 1
  resume_checkpoint:
  dataloader_workers: 0
  train_window_seed: 11
  log_every_steps: 1

execution:
  device: auto
  mixed_precision: true

evaluation:
  max_batches: 4
  sequential_step_s:

discovery:
  target_label: stimulus_change
  target_label_mode: auto
  max_batches: 8
  sampling_strategy: sequential
  min_positive_windows: 1
  negative_to_positive_ratio: 1.0
  search_max_batches:
  probe_epochs: 15
  probe_learning_rate: 1.0e-2
  top_k_candidates: 32
  candidate_session_balance_fraction: 0.2
  min_candidate_score: 0.0
  min_cluster_size: 2
  stability_rounds: 2
  shuffle_seed: 17
  pooled_feature_mode: mean_tokens

artifacts:
  checkpoint_dir: ../../artifacts/checkpoints
  summary_path: ../../artifacts/training_summary.json
  checkpoint_prefix: pcc_refined_debug
  save_config_snapshot: true
