paths:
  experiment_config_path: predictive_circuit_coding_full.yaml
  data_config_path: allen_visual_behavior_neuropixels_local.yaml
  local_artifact_root: ../../artifacts
  drive_export_root: /content/drive/MyDrive/pcc_colab_outputs

stages:
  train: true
  evaluate: true
  representation_benchmark: true
  motif_benchmark: true
  alignment_diagnostic: false
  image_identity_appendix: false

pipeline:
  step_log_every: 10
  pca_components: 64
  session_holdout_fraction: 0.5
  session_holdout_seed: 7
  neighbor_k: 5
  debug_retain_intermediates: false

tasks:
  image_target_name:
  representation: [stimulus_change, trials_go, stimulus_omitted]
  motifs: [stimulus_change, trials_go, stimulus_omitted]

arms:
  representation:
    [count_patch_mean_raw, count_patch_mean_whitened, count_patch_mean_pca_raw, count_patch_mean_pca_whitened, encoder_raw, encoder_whitened]
  motifs: [count_patch_mean_pca_raw, count_patch_mean_pca_whitened, encoder_raw, encoder_whitened]
